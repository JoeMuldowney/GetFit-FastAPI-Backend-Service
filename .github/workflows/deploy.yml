name: Getfit CI/CD

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
  # dummy variables
    env:
      DBUSER: testuser
      DBPASS: testpassword
      DBHOST: localhost
      DBNAME: testdb
      DBPORT: 5432
      SECRETKEY: itsasecret
      ALGORITHM: STRAL

    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry

      - name: Install dependencies
        run: poetry install

      - name: Lint
        run: poetry run ruff check .

      - name: Test
        run: poetry run pytest